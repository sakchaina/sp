<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนติดต่อกลับความเร็วสูง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .loading-pulse { animation: pulse-subtle 1.5s infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 text-slate-800 min-h-screen pb-20">

    <!-- Header Section -->
    <div class="bg-blue-600 text-white py-12 px-6 shadow-lg mb-8">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-6 md:mb-0">
                <h1 class="text-3xl md:text-4xl font-bold mb-2 text-white">Registration Portal</h1>
                <p class="text-blue-100">ระบบรับข้อมูลความเร็วสูง เชื่อมต่อ Cloud Database โดยตรง</p>
            </div>
            <div id="connectionStatus" class="flex items-center bg-blue-700 px-4 py-2 rounded-full text-sm">
                <span class="w-2 h-2 bg-yellow-400 rounded-full mr-2 loading-pulse"></span>
                <span id="statusText">กำลังเริ่มต้นระบบ...</span>
            </div>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- Form Section -->
            <div class="lg:col-span-5">
                <div class="glass-card p-8 rounded-3xl shadow-xl sticky top-8 border-t-4 border-blue-500">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800">ส่งข้อมูลติดต่อกลับ</h2>
                    
                    <form id="regForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อ-นามสกุล</label>
                            <input type="text" id="name" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition"
                                placeholder="สมชาย ใจดี">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">เบอร์โทรศัพท์</label>
                            <input type="tel" id="phone" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition"
                                placeholder="0812345678">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">อีเมล</label>
                            <input type="email" id="email" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition"
                                placeholder="name@company.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">รายละเอียด</label>
                            <textarea id="message" rows="3"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition"
                                placeholder="สอบถามบริการด้าน..."></textarea>
                        </div>
                        <button type="submit" id="submitBtn"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-[0.98] transition-all flex justify-center items-center disabled:bg-slate-400">
                            <span>ส่งข้อมูลทันที</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-7">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                        <h3 class="font-bold text-slate-700 flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            ผู้ลงทะเบียนล่าสุด (Real-time)
                        </h3>
                        <span id="dataCount" class="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-1 rounded-full">0 รายการ</span>
                    </div>
                    
                    <div id="listContainer" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
                        <div id="loadingIndicator" class="p-12 text-center text-slate-400">
                            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p>กำลังรอการเชื่อมต่อฐานข้อมูล...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center">
            <span id="toastMsg">บันทึกสำเร็จ</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const statusEl = document.getElementById('connectionStatus');
        const statusText = document.getElementById('statusText');
        const listContainer = document.getElementById('listContainer');
        const dataCountEl = document.getElementById('dataCount');
        const regForm = document.getElementById('regForm');
        const submitBtn = document.getElementById('submitBtn');

        let db, auth, user = null;
        let appId = 'speed-reg-app';

        const updateStatus = (text, type = 'waiting') => {
            statusText.innerText = text;
            const dot = statusEl.querySelector('span:first-child');
            dot.className = `w-2 h-2 rounded-full mr-2 ${type === 'success' ? 'bg-green-400' : type === 'error' ? 'bg-red-400' : 'bg-yellow-400 loading-pulse'}`;
        };

        const initApp = async (retries = 5) => {
            try {
                // ตรวจสอบค่า config ด้วยการวนลูปเผื่อกรณีระบบยังเตรียมตัวแปรไม่เสร็จ
                if (typeof __firebase_config === 'undefined') {
                    if (retries > 0) {
                        updateStatus(`รอกำหนดค่าระบบ... (${retries})`);
                        setTimeout(() => initApp(retries - 1), 1000);
                        return;
                    }
                    throw new Error("ไม่พบการตั้งค่า Firebase (กรุณาใช้งานผ่านระบบที่รองรับ)");
                }
                
                const firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                appId = typeof __app_id !== 'undefined' ? __app_id : 'speed-reg-app';

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                updateStatus("กำลังตรวจสอบสิทธิ์...");

                // ดำเนินการตาม Rule 3
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (currentUser) => {
                    user = currentUser;
                    if (user) {
                        updateStatus("เชื่อมต่อสำเร็จ", "success");
                        startListening();
                    } else {
                        updateStatus("ไม่พบข้อมูลผู้ใช้", "error");
                    }
                });

            } catch (error) {
                console.error("Initialization Error:", error);
                updateStatus("เชื่อมต่อล้มเหลว: " + error.message, "error");
                listContainer.innerHTML = `<div class="p-8 text-center text-red-500">ขออภัย เกิดข้อผิดพลาดในการตั้งค่าระบบ</div>`;
            }
        };

        function startListening() {
            if (!user) return;
            const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
            
            onSnapshot(collectionPath, (snapshot) => {
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderList(docs);
                dataCountEl.innerText = `${docs.length} รายการ`;
            }, (error) => {
                console.error("Firestore Error:", error);
                listContainer.innerHTML = `<div class="p-8 text-center text-red-500">ไม่สามารถเข้าถึงข้อมูลได้</div>`;
            });
        }

        function renderList(items) {
            if (items.length === 0) {
                listContainer.innerHTML = `<div class="p-12 text-center text-slate-400">ยังไม่มีรายชื่อลงทะเบียน</div>`;
                return;
            }

            listContainer.innerHTML = items.map(item => `
                <div class="p-6 hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-slate-800 text-lg">${escapeHtml(item.name || 'ไม่ระบุชื่อ')}</h4>
                        <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">
                            ${item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleString('th-TH') : 'กำลังส่ง...'}
                        </span>
                    </div>
                    <div class="flex flex-wrap gap-x-4 gap-y-1 text-sm text-slate-500 mb-3">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                            ${escapeHtml(item.phone || '-')}
                        </span>
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                            ${escapeHtml(item.email || '-')}
                        </span>
                    </div>
                    ${item.message ? `<p class="text-sm text-slate-600 bg-slate-50 p-4 rounded-2xl border border-slate-100 italic">"${escapeHtml(item.message)}"</p>` : ''}
                </div>
            `).join('');
        }

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) return showToast("⚠️ ระบบยังไม่พร้อม");

            submitBtn.disabled = true;
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = `<span class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span>`;

            try {
                const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
                await addDoc(collectionPath, {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    message: document.getElementById('message').value,
                    createdAt: serverTimestamp()
                });
                regForm.reset();
                showToast("✅ บันทึกสำเร็จ!");
            } catch (error) {
                showToast("❌ ล้มเหลว: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.addEventListener('load', () => initApp());
    </script>
</body>
</html>
