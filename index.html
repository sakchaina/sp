<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคิว Real-time Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        @keyframes border-pulse {
            0%, 100% { border-color: #ef4444; }
            50% { border-color: #fca5a5; }
        }
        .calling-active {
            animation: border-pulse 1s infinite;
            border-width: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-20">

    <!-- Header -->
    <div class="bg-indigo-600 text-white py-8 px-6 shadow-lg mb-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center justify-center md:justify-start">
                    <svg class="w-8 h-8 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>
                    Queue Pro
                </h1>
                <p class="text-indigo-100 text-sm">ระบบจัดการคิวอัจฉริยะ พร้อมเสียงเรียกคิว</p>
            </div>
            <div id="connectionStatus" class="flex items-center bg-indigo-700 px-4 py-2 rounded-full text-xs">
                <span class="w-2 h-2 bg-yellow-400 rounded-full mr-2"></span>
                <span id="statusText">กำลังเริ่มต้น...</span>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4">
        <!-- Now Serving Board -->
        <div id="servingBoard" class="mb-8 grid md:grid-cols-3 gap-4">
            <div class="md:col-span-2 bg-slate-900 rounded-3xl p-8 text-white flex flex-col items-center justify-center shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" /></svg>
                </div>
                <h3 class="text-indigo-400 font-bold uppercase tracking-[0.2em] text-sm mb-2">กำลังเรียกคิว / NOW SERVING</h3>
                <div id="currentNumber" class="text-8xl md:text-9xl font-black mb-2 tracking-tighter text-white">---</div>
                <div id="currentCounter" class="text-xl font-medium text-indigo-300">กรุณารอสักครู่</div>
            </div>
            <div class="grid grid-cols-1 gap-4 text-center">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center">
                    <p class="text-xs text-slate-400 font-bold uppercase mb-1">คิวรอรับบริการ</p>
                    <p id="waitingCount" class="text-4xl font-bold text-indigo-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center">
                    <p class="text-xs text-slate-400 font-bold uppercase mb-1">บริการเสร็จสิ้น</p>
                    <p id="doneCount" class="text-4xl font-bold text-green-500">0</p>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-3xl shadow-xl sticky top-4 border-t-4 border-indigo-500">
                    <h2 id="formTitle" class="text-lg font-bold mb-6 text-slate-800 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                        ออกบัตรคิวใหม่
                    </h2>
                    
                    <form id="regForm" class="space-y-4">
                        <input type="hidden" id="editId">
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">ชื่อลูกค้า</label>
                            <input type="text" id="name" required
                                class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white/50"
                                placeholder="ชื่อ-นามสกุล">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">เพศ</label>
                            <div class="flex gap-3">
                                <label class="flex-1 flex items-center justify-center p-3 rounded-2xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition peer-checked:bg-indigo-50">
                                    <input type="radio" name="gender" value="ชาย" required class="hidden peer">
                                    <span class="text-sm font-medium text-slate-600">ชาย</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center p-3 rounded-2xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition">
                                    <input type="radio" name="gender" value="หญิง" class="hidden peer">
                                    <span class="text-sm font-medium text-slate-600">หญิง</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center p-3 rounded-2xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition">
                                    <input type="radio" name="gender" value="อื่นๆ" class="hidden peer">
                                    <span class="text-sm font-medium text-slate-600">อื่นๆ</span>
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">เบอร์โทรศัพท์</label>
                                <input type="tel" id="phone" required
                                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white/50"
                                    placeholder="08X-XXX-XXXX">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">อีเมล</label>
                                <input type="email" id="email" required
                                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white/50"
                                    placeholder="mail@example.com">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">บริการ</label>
                            <select id="message" class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white/50">
                                <option value="สอบถามทั่วไป">สอบถามทั่วไป</option>
                                <option value="แจ้งซ่อม/เคลม">แจ้งซ่อม/เคลม</option>
                                <option value="ชำระค่าบริการ">ชำระค่าบริการ</option>
                                <option value="รับสินค้า">รับสินค้า</option>
                            </select>
                        </div>

                        <div class="pt-4">
                            <button type="submit" id="submitBtn"
                                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transform active:scale-[0.98] transition-all flex justify-center items-center">
                                <span id="btnText text-lg">ออกบัตรคิว</span>
                            </button>
                            <button type="button" id="cancelEdit" class="hidden w-full mt-4 py-2 text-slate-400 hover:text-slate-600 font-bold transition text-sm">
                                ยกเลิกการแก้ไข
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white">
                        <h3 class="font-bold text-slate-700 flex items-center">
                            <span class="w-2 h-5 bg-indigo-500 rounded-full mr-3"></span>
                            รายการคิววันนี้
                        </h3>
                        <div class="flex items-center gap-4 text-xs font-bold text-slate-400 uppercase">
                            <div class="flex items-center"><span class="w-2 h-2 rounded-full bg-slate-200 mr-1"></span> รอ</div>
                            <div class="flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-1"></span> เรียก</div>
                            <div class="flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-1"></span> เสร็จ</div>
                        </div>
                    </div>
                    
                    <div id="listContainer" class="divide-y divide-slate-100 max-h-[800px] overflow-y-auto">
                        <div class="p-20 text-center">
                            <div class="inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Calling Modal (Simple) -->
    <div id="callingModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-6">เรียกคิวนี้ไปที่ช่องบริการใด?</h3>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="confirmCall(1)" class="p-4 bg-slate-50 hover:bg-indigo-50 border border-slate-100 hover:border-indigo-200 rounded-3xl font-bold text-xl transition">ช่อง 1</button>
                <button onclick="confirmCall(2)" class="p-4 bg-slate-50 hover:bg-indigo-50 border border-slate-100 hover:border-indigo-200 rounded-3xl font-bold text-xl transition">ช่อง 2</button>
                <button onclick="confirmCall(3)" class="p-4 bg-slate-50 hover:bg-indigo-50 border border-slate-100 hover:border-indigo-200 rounded-3xl font-bold text-xl transition">ช่อง 3</button>
                <button onclick="confirmCall(4)" class="p-4 bg-slate-50 hover:bg-indigo-50 border border-slate-100 hover:border-indigo-200 rounded-3xl font-bold text-xl transition">ช่อง 4</button>
            </div>
            <button onclick="closeModal()" class="text-slate-400 font-bold hover:text-slate-600">ยกเลิก</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-[200]">
        <div class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center border border-white/10">
            <span id="toastMsg" class="font-medium tracking-wide">ดำเนินการสำเร็จ</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, push, update, remove, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCo3cgxCC7XBCY1VRtwZBujlipacjFH6cA",
            authDomain: "register-6ad84.firebaseapp.com",
            databaseURL: "https://register-6ad84-default-rtdb.firebaseio.com",
            projectId: "register-6ad84",
            storageBucket: "register-6ad84.firebasestorage.app",
            messagingSenderId: "504830835117",
            appId: "1:504830835117:web:4502a3cc43bc2ac0864924",
            measurementId: "G-SW3DF3R2BG"
        };

        const statusText = document.getElementById('statusText');
        const listContainer = document.getElementById('listContainer');
        const regForm = document.getElementById('regForm');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEdit');
        const formTitle = document.getElementById('formTitle');
        const btnText = document.getElementById('btnText');
        const modal = document.getElementById('callingModal');

        let db, auth, user = null;
        let globalData = [];
        let currentCallingId = null;

        const updateStatus = (text, type = 'waiting') => {
            statusText.innerText = text;
            const dot = document.querySelector('#connectionStatus span');
            if(dot) dot.className = `w-2 h-2 rounded-full mr-2 ${type === 'success' ? 'bg-green-400' : type === 'error' ? 'bg-red-400' : 'bg-yellow-400 animate-pulse'}`;
        };

        // --- Voice Logic ---
        function speakQueue(num, counter) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = `เชิญหมายเลข ${num.split('').join(' ')} ที่ช่องบริการหมายเลข ${counter} ค่ะ`;
            msg.lang = 'th-TH';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getDatabase(app);
                updateStatus("กำลังเข้าสู่ระบบ...");
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) {
                        updateStatus("ระบบพร้อมใช้งาน", "success");
                        startListening();
                    }
                });
            } catch (error) { updateStatus("เชื่อมต่อล้มเหลว", "error"); }
        };

        function startListening() {
            const regRef = ref(db, 'registrations');
            onValue(regRef, (snapshot) => {
                const data = snapshot.val();
                globalData = [];
                if (data) Object.keys(data).forEach(k => globalData.push({ id: k, ...data[k] }));
                globalData.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                renderQueue(globalData);
                updateBoard(globalData);
            });
        }

        function updateBoard(items) {
            const waiting = items.filter(i => i.status === 'waiting' || !i.status);
            const done = items.filter(i => i.status === 'done');
            const calling = items.find(i => i.status === 'calling');

            document.getElementById('waitingCount').innerText = waiting.length;
            document.getElementById('doneCount').innerText = done.length;

            if (calling) {
                const qIndex = items.indexOf(calling) + 1;
                document.getElementById('currentNumber').innerText = qIndex.toString().padStart(3, '0');
                document.getElementById('currentCounter').innerText = `เชิญที่ช่องบริการหมายเลข ${calling.counter || '-'}`;
            } else {
                document.getElementById('currentNumber').innerText = "---";
                document.getElementById('currentCounter').innerText = "พร้อมให้บริการ";
            }
        }

        function renderQueue(items) {
            if (items.length === 0) {
                listContainer.innerHTML = `<div class="p-16 text-center text-slate-400 font-medium">ยังไม่มีรายการจองคิว</div>`;
                return;
            }

            listContainer.innerHTML = items.map((item, idx) => {
                const qNum = (idx + 1).toString().padStart(3, '0');
                const st = item.status || 'waiting';
                const isCalling = st === 'calling';
                const isDone = st === 'done';

                return `
                <div class="p-6 flex flex-col md:flex-row items-center justify-between transition-all ${isCalling ? 'bg-red-50 ring-2 ring-red-500 ring-inset' : isDone ? 'bg-slate-50/50 grayscale' : 'hover:bg-slate-50'}">
                    <div class="flex items-center gap-6 w-full md:w-auto">
                        <div class="w-14 h-14 rounded-2xl shadow-sm flex flex-col items-center justify-center font-black ${isCalling ? 'bg-red-500 text-white' : isDone ? 'bg-slate-200 text-slate-400' : 'bg-indigo-600 text-white'}">
                            <span class="text-[9px] uppercase tracking-wider opacity-70 leading-none mb-1">Queue</span>
                            <span class="text-xl leading-none">${qNum}</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <h4 class="font-bold text-slate-800">${escapeHtml(item.name)}</h4>
                                <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase ${item.gender === 'ชาย' ? 'bg-blue-100 text-blue-600' : item.gender === 'หญิง' ? 'bg-pink-100 text-pink-600' : 'bg-slate-100 text-slate-500'}">
                                    ${item.gender || '-'}
                                </span>
                            </div>
                            <div class="flex gap-4 text-xs font-medium text-slate-400">
                                <span>${item.message}</span>
                                <span>${item.phone}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 mt-4 md:mt-0 w-full md:w-auto justify-end border-t md:border-0 pt-4 md:pt-0">
                        ${st === 'waiting' ? `
                            <button onclick="window.openCallModal('${item.id}')" class="px-5 py-2.5 bg-red-500 text-white rounded-xl font-bold text-sm shadow-lg shadow-red-200 hover:bg-red-600 transition">เรียกคิว</button>
                        ` : st === 'calling' ? `
                            <button onclick="window.finishQueue('${item.id}')" class="px-5 py-2.5 bg-green-500 text-white rounded-xl font-bold text-sm shadow-lg shadow-green-200 hover:bg-green-600 transition">เสร็จสิ้น</button>
                        ` : `
                            <button onclick="window.resetQueue('${item.id}')" class="p-2 text-slate-300 hover:text-indigo-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg></button>
                        `}
                        <div class="flex border-l border-slate-100 pl-3 ml-2">
                            <button onclick="window.editItem('${item.id}')" class="p-2 text-slate-300 hover:text-blue-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
                            <button onclick="window.deleteItem('${item.id}')" class="p-2 text-slate-300 hover:text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Window exposed functions
        window.openCallModal = (id) => { currentCallingId = id; modal.classList.remove('hidden'); };
        window.closeModal = () => { modal.classList.add('hidden'); currentCallingId = null; };
        
        window.confirmCall = async (counter) => {
            if (!currentCallingId) return;
            const itemIndex = globalData.findIndex(i => i.id === currentCallingId) + 1;
            const qNum = itemIndex.toString().padStart(3, '0');
            
            try {
                await update(ref(db, `registrations/${currentCallingId}`), { 
                    status: 'calling', 
                    counter: counter,
                    statusChangedAt: serverTimestamp() 
                });
                speakQueue(qNum, counter);
                closeModal();
                showToast(`📢 กำลังเรียกคิว ${qNum} ที่ช่อง ${counter}`);
            } catch (e) { showToast("❌ ล้มเหลว"); }
        };

        window.finishQueue = async (id) => {
            await update(ref(db, `registrations/${id}`), { status: 'done' });
            showToast("✅ บริการเสร็จสิ้น");
        };

        window.resetQueue = async (id) => {
            await update(ref(db, `registrations/${id}`), { status: 'waiting', counter: null });
            showToast("🔄 นำคิวกลับมาใหม่");
        };

        window.deleteItem = async (id) => {
            if (confirm("ลบคิวนี้?")) {
                await remove(ref(db, `registrations/${id}`));
                showToast("🗑️ ลบเรียบร้อย");
            }
        };

        window.editItem = (id) => {
            const item = globalData.find(i => i.id === id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('name').value = item.name || '';
            document.getElementById('phone').value = item.phone || '';
            document.getElementById('email').value = item.email || '';
            document.getElementById('message').value = item.message || 'สอบถามทั่วไป';
            const gs = document.getElementsByName('gender');
            for(const g of gs) if(g.value === item.gender) g.checked = true;
            formTitle.innerText = "แก้ไขข้อมูลคิว";
            btnText.innerText = "บันทึกการแก้ไข";
            cancelEditBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        cancelEditBtn.onclick = () => {
            regForm.reset();
            document.getElementById('editId').value = '';
            formTitle.innerText = "ออกบัตรคิวใหม่";
            btnText.innerText = "ออกบัตรคิว";
            cancelEditBtn.classList.add('hidden');
        };

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const g = document.querySelector('input[name="gender"]:checked');
            if (!g) return showToast("⚠️ เลือกเพศ");

            const payload = {
                name: document.getElementById('name').value,
                gender: g.value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                timestamp: editId ? (globalData.find(i => i.id === editId).timestamp) : serverTimestamp()
            };

            try {
                if (editId) {
                    await update(ref(db, `registrations/${editId}`), payload);
                    showToast("✅ อัปเดตข้อมูลแล้ว");
                    cancelEditBtn.click();
                } else {
                    await push(ref(db, 'registrations'), { ...payload, status: 'waiting' });
                    regForm.reset();
                    showToast("🎟️ จองคิวสำเร็จ!");
                }
            } catch (err) { showToast("❌ เกิดข้อผิดพลาด"); }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
