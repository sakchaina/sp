<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคิว Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        @keyframes pulse-calling {
            0%, 100% { background-color: #ef4444; }
            50% { background-color: #fca5a5; }
        }
        .animate-calling { animation: pulse-calling 1s infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-20">

    <!-- Header -->
    <div class="bg-indigo-600 text-white py-10 px-6 shadow-lg mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-6 md:mb-0">
                <h1 class="text-3xl md:text-4xl font-bold mb-2 text-white">Queue Management System</h1>
                <p class="text-indigo-100 italic">ระบบจองคิวและเรียกคิวอัตโนมัติแบบ Real-time</p>
            </div>
            <div id="connectionStatus" class="flex items-center bg-indigo-700 px-4 py-2 rounded-full text-sm">
                <span class="w-2 h-2 bg-yellow-400 rounded-full mr-2"></span>
                <span id="statusText">กำลังเชื่อมต่อ...</span>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4">
        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- Queue Form Section -->
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-3xl shadow-xl sticky top-8 border-t-4 border-indigo-500">
                    <h2 id="formTitle" class="text-xl font-bold mb-6 text-slate-800 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        รับบัตรคิวใหม่
                    </h2>
                    
                    <form id="regForm" class="space-y-4">
                        <input type="hidden" id="editId">
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อลูกค้า</label>
                            <input type="text" id="name" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition"
                                placeholder="ชื่อ-นามสกุล">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">เพศ</label>
                            <div class="flex gap-4">
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="gender" value="ชาย" required class="w-4 h-4 text-indigo-600">
                                    <span class="ml-2 text-slate-700">ชาย</span>
                                </label>
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="gender" value="หญิง" class="w-4 h-4 text-indigo-600">
                                    <span class="ml-2 text-slate-700">หญิง</span>
                                </label>
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="gender" value="อื่นๆ" class="w-4 h-4 text-indigo-600">
                                    <span class="ml-2 text-slate-700">อื่นๆ</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">เบอร์โทรศัพท์</label>
                            <input type="tel" id="phone" required
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition"
                                placeholder="08X-XXX-XXXX">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">บริการที่ต้องการ</label>
                            <select id="message" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white">
                                <option value="สอบถามทั่วไป">สอบถามทั่วไป</option>
                                <option value="แจ้งซ่อม/เคลม">แจ้งซ่อม/เคลม</option>
                                <option value="ชำระค่าบริการ">ชำระค่าบริการ</option>
                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>

                        <div class="pt-2">
                            <button type="submit" id="submitBtn"
                                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-[0.98] transition-all flex justify-center items-center">
                                <span id="btnText">ออกบัตรคิว</span>
                            </button>
                            <button type="button" id="cancelEdit" class="hidden w-full mt-2 py-2 text-slate-500 font-medium hover:underline transition">
                                ยกเลิกการแก้ไข
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Queue Display Section -->
            <div class="lg:col-span-8">
                <!-- Counter Status Summary -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">คิวทั้งหมด</p>
                        <p id="totalQueue" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-indigo-50 p-4 rounded-2xl shadow-sm border border-indigo-100 text-center">
                        <p class="text-xs text-indigo-400 font-bold uppercase tracking-wider mb-1">กำลังรอ</p>
                        <p id="waitingQueue" class="text-2xl font-bold text-indigo-600">0</p>
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl shadow-sm border border-red-100 text-center">
                        <p class="text-xs text-red-400 font-bold uppercase tracking-wider mb-1">กำลังเรียก</p>
                        <p id="callingQueue" class="text-2xl font-bold text-red-600">0</p>
                    </div>
                    <div class="bg-green-50 p-4 rounded-2xl shadow-sm border border-green-100 text-center">
                        <p class="text-xs text-green-400 font-bold uppercase tracking-wider mb-1">เสร็จสิ้น</p>
                        <p id="doneQueue" class="text-2xl font-bold text-green-600">0</p>
                    </div>
                </div>

                <!-- Queue List Container -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                        <h3 class="font-bold text-slate-700">รายการคิวประจำวัน</h3>
                        <div class="flex gap-2">
                            <span class="flex items-center text-xs text-slate-400">
                                <span class="w-2 h-2 bg-indigo-500 rounded-full mr-1"></span> รอ
                            </span>
                            <span class="flex items-center text-xs text-slate-400">
                                <span class="w-2 h-2 bg-red-500 rounded-full mr-1"></span> เรียก
                            </span>
                        </div>
                    </div>
                    
                    <div id="listContainer" class="divide-y divide-slate-100 max-h-[800px] overflow-y-auto">
                        <!-- Items will be injected here -->
                        <div class="p-12 text-center text-slate-400">
                            <div class="inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p>กำลังเชื่อมต่อระบบคิว...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center">
            <span id="toastMsg">บันทึกสำเร็จ</span>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, push, update, remove, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // --- ตั้งค่า Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyCo3cgxCC7XBCY1VRtwZBujlipacjFH6cA",
            authDomain: "register-6ad84.firebaseapp.com",
            databaseURL: "https://register-6ad84-default-rtdb.firebaseio.com",
            projectId: "register-6ad84",
            storageBucket: "register-6ad84.firebasestorage.app",
            messagingSenderId: "504830835117",
            appId: "1:504830835117:web:4502a3cc43bc2ac0864924",
            measurementId: "G-SW3DF3R2BG"
        };

        const statusText = document.getElementById('statusText');
        const listContainer = document.getElementById('listContainer');
        const regForm = document.getElementById('regForm');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEdit');
        const formTitle = document.getElementById('formTitle');
        const btnText = document.getElementById('btnText');

        let db, auth, user = null;
        let globalData = [];

        const updateStatus = (text, type = 'waiting') => {
            statusText.innerText = text;
            const dot = document.querySelector('#connectionStatus span');
            dot.className = `w-2 h-2 rounded-full mr-2 ${type === 'success' ? 'bg-green-400' : type === 'error' ? 'bg-red-400' : 'bg-yellow-400 animate-pulse'}`;
        };

        const init = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getDatabase(app);

                updateStatus("กำลังตรวจสอบสิทธิ์...");
                await signInAnonymously(auth);

                onAuthStateChanged(auth, (currentUser) => {
                    user = currentUser;
                    if (user) {
                        updateStatus("ระบบพร้อมใช้งาน", "success");
                        startListening();
                    }
                });
            } catch (error) {
                updateStatus("เชื่อมต่อล้มเหลว", "error");
            }
        };

        function startListening() {
            if (!user || !db) return;
            const regRef = ref(db, 'registrations');
            
            onValue(regRef, (snapshot) => {
                const data = snapshot.val();
                globalData = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        globalData.push({ id: key, ...data[key] });
                    });
                }
                
                // คิวต้องเรียงตามเวลาที่จอง (ก่อนไปหลัง)
                globalData.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                
                renderQueueList(globalData);
                updateSummary(globalData);
            });
        }

        function updateSummary(items) {
            document.getElementById('totalQueue').innerText = items.length;
            document.getElementById('waitingQueue').innerText = items.filter(i => i.status === 'waiting' || !i.status).length;
            document.getElementById('callingQueue').innerText = items.filter(i => i.status === 'calling').length;
            document.getElementById('doneQueue').innerText = items.filter(i => i.status === 'done').length;
        }

        function renderQueueList(items) {
            if (!listContainer) return;
            if (items.length === 0) {
                listContainer.innerHTML = `<div class="p-12 text-center text-slate-400">ยังไม่มีรายการคิวในขณะนี้</div>`;
                return;
            }

            // แสดงรายการโดยเอาคิวที่ยังไม่เสร็จขึ้นก่อน หรือแสดงตามลำดับที่จอง
            listContainer.innerHTML = items.map((item, index) => {
                const queueNo = (index + 1).toString().padStart(3, '0');
                const isWaiting = !item.status || item.status === 'waiting';
                const isCalling = item.status === 'calling';
                const isDone = item.status === 'done';

                let statusBadge = `<span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">รอเรียก</span>`;
                if (isCalling) statusBadge = `<span class="bg-red-500 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider animate-pulse">กำลังเรียก</span>`;
                if (isDone) statusBadge = `<span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">เสร็จสิ้น</span>`;

                return `
                <div class="p-6 transition-all border-b border-slate-50 last:border-0 group ${isCalling ? 'bg-red-50/50' : isDone ? 'opacity-60 grayscale-[0.5]' : 'hover:bg-slate-50'}">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        
                        <!-- Left: Queue Number & Info -->
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-2xl ${isCalling ? 'bg-red-500 text-white' : isDone ? 'bg-slate-200 text-slate-500' : 'bg-indigo-600 text-white'} flex flex-col items-center justify-center shadow-md">
                                <span class="text-[10px] font-bold uppercase opacity-80">คิว</span>
                                <span class="text-xl font-bold leading-tight">${queueNo}</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h4 class="font-bold text-slate-800 text-lg">${escapeHtml(item.name)}</h4>
                                    ${statusBadge}
                                </div>
                                <div class="flex gap-3 text-xs text-slate-500 font-medium">
                                    <span class="flex items-center">
                                        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                                        ${item.gender}
                                    </span>
                                    <span class="flex items-center">
                                        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                                        ${item.message}
                                    </span>
                                    <span class="text-slate-400 font-normal italic">
                                        ${item.timestamp ? new Date(item.timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : ''}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Actions -->
                        <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                            ${isWaiting ? `
                                <button onclick="window.updateStatus('${item.id}', 'calling')" class="flex-1 md:flex-none px-4 py-2 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded-xl transition shadow-sm">
                                    เรียกคิว
                                </button>
                            ` : isCalling ? `
                                <button onclick="window.updateStatus('${item.id}', 'done')" class="flex-1 md:flex-none px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-xs font-bold rounded-xl transition shadow-sm">
                                    เสร็จสิ้น
                                </button>
                            ` : `
                                <button onclick="window.updateStatus('${item.id}', 'waiting')" class="px-3 py-2 text-slate-400 hover:text-indigo-600 transition" title="เอากลับมาใหม่">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                </button>
                            `}
                            
                            <div class="flex gap-1 border-l pl-2 border-slate-100">
                                <button onclick="window.editItem('${item.id}')" class="p-2 text-slate-400 hover:text-blue-500 transition">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </button>
                                <button onclick="window.deleteItem('${item.id}')" class="p-2 text-slate-400 hover:text-red-500 transition">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ฟังก์ชันจัดการสถานะคิว
        window.updateStatus = async (id, newStatus) => {
            try {
                await update(ref(db, `registrations/${id}`), { 
                    status: newStatus,
                    statusChangedAt: serverTimestamp()
                });
                showToast(newStatus === 'calling' ? "📢 กำลังเรียกคิว..." : "✅ คิวเสร็จสิ้น!");
            } catch (err) {
                showToast("❌ ผิดพลาด!");
            }
        };

        window.editItem = (id) => {
            const item = globalData.find(i => i.id === id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('name').value = item.name || '';
            document.getElementById('phone').value = item.phone || '';
            document.getElementById('message').value = item.message || 'สอบถามทั่วไป';
            const genders = document.getElementsByName('gender');
            for(const g of genders) if(g.value === item.gender) g.checked = true;

            formTitle.innerText = "แก้ไขข้อมูลคิว";
            btnText.innerText = "บันทึกข้อมูล";
            cancelEditBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        cancelEditBtn.onclick = () => {
            regForm.reset();
            document.getElementById('editId').value = '';
            formTitle.innerText = "รับบัตรคิวใหม่";
            btnText.innerText = "ออกบัตรคิว";
            cancelEditBtn.classList.add('hidden');
        };

        window.deleteItem = async (id) => {
            if (confirm('ลบคิวนี้ออกจากรายการ?')) {
                await remove(ref(db, `registrations/${id}`));
                showToast("🗑️ ลบคิวเรียบร้อย");
            }
        };

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            submitBtn.disabled = true;
            
            const genderVal = document.querySelector('input[name="gender"]:checked').value;
            const payload = {
                name: document.getElementById('name').value,
                gender: genderVal,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value,
                email: document.getElementById('email').value,
                status: editId ? (globalData.find(i => i.id === editId)?.status || 'waiting') : 'waiting',
                timestamp: editId ? (globalData.find(i => i.id === editId)?.timestamp) : serverTimestamp()
            };

            try {
                if (editId) {
                    await update(ref(db, `registrations/${editId}`), payload);
                    showToast("✅ แก้ไขเรียบร้อย");
                    cancelEditBtn.click();
                } else {
                    await push(ref(db, 'registrations'), payload);
                    regForm.reset();
                    showToast("🎟️ จองคิวสำเร็จ!");
                }
            } catch (err) {
                showToast("❌ ล้มเหลว");
            } finally {
                submitBtn.disabled = false;
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
